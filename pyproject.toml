[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantum-hw-interface"
version = "0.1.0"
description = "User-facing interface for controlling quantum hardware"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "Your Name"}]
dependencies = [
  "numpy>=1.24",
  "scipy>=1.10",
  "ipython>=8.0",
  "networkx>=3.0",
  "openqasm3[parser]>=0.5",
  "requests>=2.31",
]

[project.optional-dependencies]
viz = ["matplotlib>=3.7"]
test = [
  "quarkstudio",
  "quarkcircuit",
  "pytest>=7.4",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
